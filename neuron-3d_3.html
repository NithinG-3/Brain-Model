<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Neuron — Interactive Model</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060b18; font-family: system-ui, sans-serif; color: #c8dcff; overflow: hidden; }
    #wrap { position: relative; width: 100vw; height: 100vh; }
    canvas { display: block; width: 100%; height: 100%; }
    #panel {
      position: absolute; top: 16px; left: 16px;
      background: rgba(6,11,24,0.88); border: 0.5px solid rgba(80,140,255,0.3);
      border-radius: 10px; padding: 14px 16px; max-width: 240px;
      pointer-events: none; backdrop-filter: blur(6px);
    }
    #pname { font-size: 13px; font-weight: 600; color: #90b8ff; margin-bottom: 5px; }
    #pdesc { font-size: 12px; color: #7a9acc; line-height: 1.55; }
    #controls { position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 8px; }
    button {
      background: rgba(6,11,24,0.85); border-radius: 8px; font-size: 12px;
      padding: 8px 14px; cursor: pointer; backdrop-filter: blur(6px); white-space: nowrap;
    }
    #btnAP  { border: 0.5px solid rgba(80,200,130,0.5); color: #5de8a0; }
    #btnRot { border: 0.5px solid rgba(80,140,255,0.35); color: #80aaff; }
    #btnAP:hover  { background: rgba(30,80,55,0.7); }
    #btnRot:hover { background: rgba(20,40,90,0.7); }
    #legend {
      position: absolute; bottom: 14px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; padding: 0 16px;
    }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; }
    .leg { display: flex; align-items: center; font-size: 11px; color: #7a9acc; }
    #hint {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: rgba(120,160,220,0.45); pointer-events: none;
    }
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="panel">
    <div id="pname">Hover a part</div>
    <div id="pdesc">Drag to rotate · scroll to zoom · click to lock</div>
  </div>
  <div id="controls">
    <button id="btnAP">⚡ Fire action potential</button>
    <button id="btnRot">Auto-rotate: on</button>
  </div>
  <div id="legend">
    <div class="leg"><span class="dot" style="background:#2266dd"></span>Soma</div>
    <div class="leg"><span class="dot" style="background:#7744cc"></span>Dendrites</div>
    <div class="leg"><span class="dot" style="background:#1aaa55"></span>Axon</div>
    <div class="leg"><span class="dot" style="background:#cc6600"></span>Myelin</div>
    <div class="leg"><span class="dot" style="background:#dd2255"></span>Terminals</div>
    <div class="leg"><span class="dot" style="background:#ddaa00"></span>Nucleus</div>
    <div class="leg"><span class="dot" style="background:#11ccaa"></span>Nodes of Ranvier</div>
  </div>
  <div id="hint">drag to rotate · scroll to zoom</div>
</div>

<script>
/* ── RENDERER ── */
const canvas   = document.getElementById('c');
const wrap     = document.getElementById('wrap');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
renderer.toneMapping       = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060b18);
scene.fog        = new THREE.FogExp2(0x060b18, 0.018);

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 200);
camera.position.set(0, -3, 22);

function resize() {
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

/* ── LIGHTING ── */
scene.add(new THREE.AmbientLight(0x2233aa, 1.8));

const keyLight = new THREE.DirectionalLight(0x8899ff, 5);
keyLight.position.set(8, 12, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x441166, 2.5);
fillLight.position.set(-10, -5, -8);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x0077cc, 2);
rimLight.position.set(0, 2, -12);
scene.add(rimLight);

const somaGlow = new THREE.PointLight(0x2244ff, 2.5, 7);
somaGlow.position.set(0, 0, 0);
scene.add(somaGlow);

/* ── GROUP ── */
const group = new THREE.Group();
scene.add(group);
const parts = [];

/* ── MATERIALS ── */
function mat(color, emissive, rough = 0.38, metal = 0.18, opacity = 1, transparent = false) {
  return new THREE.MeshStandardMaterial({
    color, emissive, roughness: rough, metalness: metal,
    opacity, transparent,
    envMapIntensity: 0.4
  });
}

const mats = {
  soma:     mat(0x1a5ecc, 0x081835, 0.28, 0.22),
  nucleus:  mat(0xcc9910, 0x442200, 0.28, 0.38, 0.82, true),
  dend:     mat(0x6633bb, 0x1a0844, 0.42, 0.12),
  spine:    mat(0x8844dd, 0x220833, 0.45, 0.08),
  axon:     mat(0x119944, 0x042510, 0.35, 0.12),
  myelin:   mat(0xbb5500, 0x3a1400, 0.42, 0.18),
  node:     mat(0x11ccaa, 0x004433, 0.32, 0.18),
  term:     mat(0xcc1a44, 0x440010, 0.38, 0.28),
  hillock:  mat(0x117733, 0x032210, 0.38, 0.12),
  membrane: mat(0x112255, 0x060e1a, 0.65, 0.04, 0.14, true),
};

/* ── HELPERS ── */
function addMesh(geo, mat, name, desc, pos, castShadow = true) {
  const m = new THREE.Mesh(geo, mat);
  if (pos) m.position.copy(pos);
  m.castShadow  = castShadow;
  m.receiveShadow = true;
  m.userData    = { name, desc };
  group.add(m);
  parts.push(m);
  return m;
}

function sphere(pos, r, m, name, desc, ws = 40, hs = 40) {
  return addMesh(new THREE.SphereGeometry(r, ws, hs), m, name, desc, pos);
}

// Tapered tube: radiusFn(t) → radius at normalized position t along curve
function taperedTube(pts, radiusFn, mat, name, desc, segs = 32, rsegs = 12) {
  const curve = new THREE.CatmullRomCurve3(pts);
  // Build custom geometry by sampling cross-sections
  const positions = [];
  const normals   = [];
  const uvs       = [];
  const indices   = [];

  for (let i = 0; i <= segs; i++) {
    const t  = i / segs;
    const r  = radiusFn(t);
    const pt = curve.getPoint(t);
    const tangent = curve.getTangent(t).normalize();

    // Build a local frame (Frenet-like)
    let normal = new THREE.Vector3(0, 1, 0);
    if (Math.abs(tangent.dot(normal)) > 0.99) normal.set(1, 0, 0);
    const binormal = tangent.clone().cross(normal).normalize();
    normal = binormal.clone().cross(tangent).normalize();

    for (let j = 0; j <= rsegs; j++) {
      const angle = (j / rsegs) * Math.PI * 2;
      const cos = Math.cos(angle), sin = Math.sin(angle);
      const nx = normal.x * cos + binormal.x * sin;
      const ny = normal.y * cos + binormal.y * sin;
      const nz = normal.z * cos + binormal.z * sin;
      positions.push(pt.x + nx * r, pt.y + ny * r, pt.z + nz * r);
      normals.push(nx, ny, nz);
      uvs.push(j / rsegs, t);
    }
  }

  for (let i = 0; i < segs; i++) {
    for (let j = 0; j < rsegs; j++) {
      const a = i * (rsegs + 1) + j;
      const b = a + rsegs + 1;
      indices.push(a, b, a + 1, b, b + 1, a + 1);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('normal',   new THREE.Float32BufferAttribute(normals,   3));
  geo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs,       2));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow   = true;
  mesh.receiveShadow = true;
  mesh.userData = { name, desc };
  group.add(mesh);
  parts.push(mesh);
  return { mesh, curve };
}

// Convenience: uniform-radius tube
function tube(pts, r, m, name, desc, segs = 28, rsegs = 10) {
  return taperedTube(pts, () => r, m, name, desc, segs, rsegs);
}

/* ═══════════════════════════════════════════════════════════════
   SOMA — slightly lumpy sphere with transparent membrane
═══════════════════════════════════════════════════════════════ */
// Lumpy soma: displace vertices slightly
const somaGeo = new THREE.SphereGeometry(1.18, 64, 64);
const somaPos = somaGeo.attributes.position;
for (let i = 0; i < somaPos.count; i++) {
  const v = new THREE.Vector3().fromBufferAttribute(somaPos, i);
  const noise = 0.04 * (Math.sin(v.x * 4.1) * Math.cos(v.y * 3.7) + Math.sin(v.z * 4.8));
  v.multiplyScalar(1 + noise);
  somaPos.setXYZ(i, v.x, v.y, v.z);
}
somaGeo.computeVertexNormals();
const soma = new THREE.Mesh(somaGeo, mats.soma);
soma.castShadow = soma.receiveShadow = true;
soma.userData = {
  name: "Soma (cell body)",
  desc: "Metabolic hub of the neuron. Integrates all incoming synaptic signals. Houses the nucleus, ribosomes, mitochondria, and Golgi apparatus."
};
group.add(soma); parts.push(soma);

// Transparent membrane
const memGeo = new THREE.SphereGeometry(1.26, 48, 48);
const mem = new THREE.Mesh(memGeo, mats.membrane);
mem.userData = { name: "Cell membrane", desc: "Phospholipid bilayer with voltage-gated Na⁺, K⁺, Cl⁻ channels. Maintains resting potential of −70 mV." };
group.add(mem); parts.push(mem);

// Nucleus
sphere(new THREE.Vector3(0.12, 0.1, 0.05), 0.5, mats.nucleus,
  "Nucleus", "Houses neuronal DNA. Transcribes genes for proteins essential to synaptic transmission and plasticity.");

/* ═══════════════════════════════════════════════════════════════
   DENDRITES — thick base, aggressive taper, dense spines
═══════════════════════════════════════════════════════════════ */
function dendBranch(start, dir, len, baseR, depth, spineProb = 0.7) {
  if (depth === 0 || len < 0.15) return;

  const ndir = dir.clone().normalize();
  // Organic bend
  const bend1 = new THREE.Vector3(
    (Math.random() - 0.5) * 0.7,
    (Math.random() - 0.5) * 0.5,
    (Math.random() - 0.5) * 0.6
  );
  const mid1 = start.clone().addScaledVector(ndir, len * 0.35).add(bend1.multiplyScalar(0.4));
  const bend2 = new THREE.Vector3(
    (Math.random() - 0.5) * 0.5,
    (Math.random() - 0.5) * 0.4,
    (Math.random() - 0.5) * 0.5
  );
  const mid2 = start.clone().addScaledVector(ndir, len * 0.68).add(bend2.multiplyScalar(0.3));
  const end  = start.clone().addScaledVector(ndir, len);

  const tipR = baseR * 0.28;
  taperedTube([start, mid1, mid2, end], t => baseR * (1 - t) + tipR * t,
    mats.dend, "Dendrite",
    "Receives synaptic input. Branching geometry maximises receptive surface area.",
    20, 10
  );

  // Dendritic spines — more frequent, varied sizes
  const numSpines = Math.floor(1 + Math.random() * 2);
  for (let i = 0; i < numSpines; i++) {
    if (Math.random() > spineProb) continue;
    const t       = 0.15 + Math.random() * 0.75;
    const pos     = start.clone().lerp(end, t);
    const perp    = new THREE.Vector3(
      ndir.y + (Math.random() - 0.5) * 0.8,
     -ndir.x + (Math.random() - 0.5) * 0.8,
      (Math.random() - 0.5) * 0.6
    ).normalize();
    const stalkLen = 0.12 + Math.random() * 0.18;
    const stalkEnd = pos.clone().addScaledVector(perp, stalkLen);
    const stalkMid = pos.clone().lerp(stalkEnd, 0.5).add(
      new THREE.Vector3((Math.random()-0.5)*0.06,(Math.random()-0.5)*0.06,(Math.random()-0.5)*0.06)
    );
    tube([pos, stalkMid, stalkEnd], 0.028, mats.spine,
      "Dendritic spine", "Postsynaptic specialization. Shape changes underlie long-term potentiation (LTP), the cellular basis of memory.",
      6, 5);
    // Mushroom-shaped head
    const headR = 0.055 + Math.random() * 0.04;
    sphere(stalkEnd, headR, mats.spine, "Spine head",
      "Contains AMPA and NMDA glutamate receptors. Structural remodelling here encodes synaptic strength.");
  }

  if (depth > 1) {
    // Two child branches with diverging directions
    const right = new THREE.Vector3(
      ndir.y + (Math.random()-0.5)*0.6,
     -ndir.x + (Math.random()-0.5)*0.4,
      ndir.z  + (Math.random()-0.5)*0.5
    ).normalize();
    const left = new THREE.Vector3(
      -ndir.y + (Math.random()-0.5)*0.5,
       ndir.x + (Math.random()-0.5)*0.4,
      -ndir.z + (Math.random()-0.5)*0.4
    ).normalize();
    const childLen = len * (0.58 + Math.random() * 0.12);
    dendBranch(end, right, childLen, tipR * 1.35, depth - 1, spineProb * 1.1);
    dendBranch(end, left,  childLen, tipR * 1.35, depth - 1, spineProb * 1.1);
    // Occasional third branch for realistic arbor density
    if (depth > 2 && Math.random() > 0.45) {
      const mid3 = ndir.clone()
        .lerp(new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)), 0.55)
        .normalize();
      dendBranch(end, mid3, childLen * 0.75, tipR * 1.1, depth - 2, spineProb);
    }
  }
}

// Primary dendrite trunks radiating from soma — 8 directions
const dendRoots = [
  { d: new THREE.Vector3( 1.0,  1.5,  0.3), r: 0.22 },
  { d: new THREE.Vector3(-1.1,  1.3,  0.2), r: 0.21 },
  { d: new THREE.Vector3( 0.3,  1.6, -0.9), r: 0.20 },
  { d: new THREE.Vector3(-0.5,  1.0,  1.3), r: 0.20 },
  { d: new THREE.Vector3( 1.2,  0.5, -1.0), r: 0.19 },
  { d: new THREE.Vector3(-1.0,  0.4, -0.9), r: 0.18 },
  { d: new THREE.Vector3( 0.7,  1.2,  1.0), r: 0.19 },
  { d: new THREE.Vector3(-0.3,  0.8, -1.1), r: 0.17 },
];

dendRoots.forEach(({ d, r }) => {
  const nd    = d.clone().normalize();
  const start = nd.clone().multiplyScalar(1.1);
  dendBranch(start, nd, 1.55, r, 4, 0.65);
});

/* ═══════════════════════════════════════════════════════════════
   AXON HILLOCK — funnel-shaped tapering cone
═══════════════════════════════════════════════════════════════ */
const hillockPts = [
  new THREE.Vector3( 0.0,  -1.1,  0.0),
  new THREE.Vector3( 0.06, -1.55, 0.04),
  new THREE.Vector3( 0.1,  -1.95, 0.07),
  new THREE.Vector3( 0.12, -2.3,  0.08),
];
taperedTube(hillockPts, t => 0.32 - t * 0.20,
  mats.hillock,
  "Axon hillock",
  "Trigger zone — action potentials fire here when summed dendritic input reaches ~−55 mV. Highest Na⁺ channel density of any neuronal compartment.",
  16, 10
);

/* ═══════════════════════════════════════════════════════════════
   AXON — long gentle curve
═══════════════════════════════════════════════════════════════ */
const axonPts = [
  new THREE.Vector3( 0.12, -2.3,   0.08),
  new THREE.Vector3( 0.28, -3.2,   0.15),
  new THREE.Vector3(-0.15, -4.5,   0.20),
  new THREE.Vector3( 0.20, -5.8,  -0.10),
  new THREE.Vector3(-0.10, -7.1,   0.14),
  new THREE.Vector3( 0.14, -8.5,   0.02),
  new THREE.Vector3( 0.05, -9.5,   0.0 ),
];
const { curve: axonSpline } = tube(axonPts, 0.11, mats.axon,
  "Axon",
  "Signal-carrying fiber. Myelinated axons conduct at 70–120 m/s. Can be up to 1 m long in humans.",
  44, 9
);

/* ═══════════════════════════════════════════════════════════════
   MYELIN SHEATHS — barrel/sausage shape (bulge at center)
   Nodes of Ranvier — pinched constrictions
═══════════════════════════════════════════════════════════════ */
const nodeTs  = [0.20, 0.36, 0.52, 0.68, 0.84];
const nodeGap = 0.016;

// Barrel profile: swells in the middle, tapers at ends
function barrelR(t, maxR = 0.30, minR = 0.14) {
  // t goes 0→1 within the sheath segment
  return minR + (maxR - minR) * Math.sin(t * Math.PI);
}

const myelinRanges = [
  { t0: 0.055,                t1: nodeTs[0] - nodeGap },
  { t0: nodeTs[0] + nodeGap,  t1: nodeTs[1] - nodeGap },
  { t0: nodeTs[1] + nodeGap,  t1: nodeTs[2] - nodeGap },
  { t0: nodeTs[2] + nodeGap,  t1: nodeTs[3] - nodeGap },
  { t0: nodeTs[3] + nodeGap,  t1: nodeTs[4] - nodeGap },
];

myelinRanges.forEach(({ t0, t1 }) => {
  const pts = [];
  const N = 24;
  for (let i = 0; i <= N; i++) pts.push(axonSpline.getPoint(t0 + (t1 - t0) * i / N));
  taperedTube(pts, t => barrelR(t, 0.30, 0.115),
    mats.myelin,
    "Myelin sheath",
    "Schwann cell (PNS) wrapping. Electrically insulates the axon; enables saltatory conduction up to 100× faster than unmyelinated fibers.",
    24, 14
  );
});

// Nodes of Ranvier — narrow exposed rings
nodeTs.forEach(t => {
  const center = axonSpline.getPoint(t);
  // Small torus-like ring to represent the constriction
  const ringPts = [];
  for (let i = 0; i <= 8; i++) {
    const tt = (t - nodeGap * 2.5) + (nodeGap * 5) * i / 8;
    const clamped = Math.max(0, Math.min(1, tt));
    ringPts.push(axonSpline.getPoint(clamped));
  }
  taperedTube(ringPts, tt => {
    // Pinched: thin at ends, slightly wider at node center
    const mid = Math.abs(tt - 0.5) * 2; // 0 at center, 1 at edges
    return 0.095 + (1 - mid) * 0.03;
  }, mats.node,
    "Node of Ranvier",
    "~1 µm exposed gap packed with voltage-gated Na⁺/K⁺ channels. Action potential regenerates here via saltatory conduction.",
    8, 10
  );
});

/* ═══════════════════════════════════════════════════════════════
   AXON TERMINALS — arborizing branches with bulbed boutons
═══════════════════════════════════════════════════════════════ */
const termBase = axonSpline.getPoint(1.0);

function termBranch(start, dir, len, depth) {
  if (depth === 0 || len < 0.15) {
    // Terminal bouton
    sphere(start, 0.14 + Math.random() * 0.06, mats.term,
      "Synaptic bouton",
      "Contains 200–500 synaptic vesicles loaded with neurotransmitter. Ca²⁺ influx triggers vesicle fusion and transmitter release."
    );
    return;
  }

  const nd  = dir.clone().normalize();
  const mid = start.clone().addScaledVector(nd, len * 0.5).add(
    new THREE.Vector3((Math.random()-0.5)*0.25, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.25)
  );
  const end = start.clone().addScaledVector(nd, len);

  taperedTube([start, mid, end], t => 0.075 * (1 - t * 0.5),
    mats.axon,
    "Axon terminal branch",
    "Fine terminal arborization. One neuron can contact thousands of postsynaptic targets.",
    12, 7
  );

  if (depth > 1) {
    const r1 = new THREE.Vector3(nd.y+(Math.random()-0.5)*0.8, -nd.x+(Math.random()-0.5)*0.6, nd.z+(Math.random()-0.5)*0.7).normalize();
    const r2 = new THREE.Vector3(-nd.y+(Math.random()-0.5)*0.7, nd.x+(Math.random()-0.5)*0.5,-nd.z+(Math.random()-0.5)*0.6).normalize();
    termBranch(end, r1, len * 0.62, depth - 1);
    termBranch(end, r2, len * 0.62, depth - 1);
  } else {
    termBranch(end, nd, len * 0.5, 0);
  }
}

const termDirs = [
  new THREE.Vector3( 1.0, -0.4,  0.8),
  new THREE.Vector3(-0.9, -0.5,  0.7),
  new THREE.Vector3( 0.7, -0.5, -0.9),
  new THREE.Vector3(-1.0, -0.3, -0.6),
  new THREE.Vector3( 0.3, -1.0,  0.8),
  new THREE.Vector3(-0.2, -1.0, -0.7),
];
termDirs.forEach(d => termBranch(termBase, d.normalize(), 0.9, 2));

/* ═══════════════════════════════════════════════════════════════
   ACTION POTENTIAL
═══════════════════════════════════════════════════════════════ */
const apSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.20, 24, 24),
  new THREE.MeshStandardMaterial({
    color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2.0,
    roughness: 0.05, metalness: 0.6
  })
);
apSphere.visible = false;
group.add(apSphere);

const apLight = new THREE.PointLight(0x00ffcc, 0, 5);
group.add(apLight);

let apRunning = false, apT = 0;

document.getElementById('btnAP').addEventListener('click', () => {
  if (apRunning) return;
  apRunning = true; apT = 0;
  apSphere.visible = true;
  document.getElementById('btnAP').textContent = '⚡ Firing…';
});

/* ═══════════════════════════════════════════════════════════════
   CAMERA CONTROLS
═══════════════════════════════════════════════════════════════ */
let isDrag = false, prevM = { x: 0, y: 0 };
let rotX = 0.12, rotY = 0, tRotX = 0.12, tRotY = 0;
let autoRot = true, locked = false;

canvas.addEventListener('mousedown', e => { isDrag = true; prevM = { x: e.clientX, y: e.clientY }; });
window.addEventListener('mouseup', () => isDrag = false);
window.addEventListener('mousemove', e => {
  if (isDrag) {
    tRotY += (e.clientX - prevM.x) * 0.010;
    tRotX += (e.clientY - prevM.y) * 0.010;
    tRotX  = Math.max(-1.2, Math.min(1.2, tRotX));
    prevM  = { x: e.clientX, y: e.clientY };
    autoRot = false;
    document.getElementById('btnRot').textContent = 'Auto-rotate: off';
  }
  handleHover(e.clientX, e.clientY);
});
canvas.addEventListener('wheel', e => {
  camera.position.z = Math.max(6, Math.min(26, camera.position.z + e.deltaY * 0.016));
}, { passive: true });

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) { isDrag = true; prevM = { x: e.touches[0].clientX, y: e.touches[0].clientY }; }
});
canvas.addEventListener('touchend', () => isDrag = false);
canvas.addEventListener('touchmove', e => {
  if (isDrag && e.touches.length === 1) {
    tRotY += (e.touches[0].clientX - prevM.x) * 0.010;
    tRotX += (e.touches[0].clientY - prevM.y) * 0.010;
    prevM  = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  e.preventDefault();
}, { passive: false });

document.getElementById('btnRot').addEventListener('click', () => {
  autoRot = !autoRot;
  document.getElementById('btnRot').textContent = 'Auto-rotate: ' + (autoRot ? 'on' : 'off');
});

const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x =  ((e.clientX - r.left) / r.width)  * 2 - 1;
  mouse.y = -((e.clientY - r.top)  / r.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(parts);
  if (hits.length > 0 && hits[0].object.userData.name) {
    locked = !locked;
    document.getElementById('panel').style.borderColor = locked
      ? 'rgba(255,200,60,0.7)' : 'rgba(80,140,255,0.3)';
  } else {
    locked = false;
    document.getElementById('panel').style.borderColor = 'rgba(80,140,255,0.3)';
  }
});

function handleHover(cx, cy) {
  if (locked) return;
  const r = canvas.getBoundingClientRect();
  mouse.x =  ((cx - r.left) / r.width)  * 2 - 1;
  mouse.y = -((cy - r.top)  / r.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(parts);
  if (hits.length > 0 && hits[0].object.userData.name) {
    const d = hits[0].object.userData;
    document.getElementById('pname').textContent = d.name;
    document.getElementById('pdesc').textContent = d.desc;
  }
}

/* ═══════════════════════════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════════════════════════ */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t  = clock.getElapsedTime();

  somaGlow.intensity = 2.0 + Math.sin(t * 0.85) * 0.8 + Math.sin(t * 2.3) * 0.25;

  if (autoRot) tRotY += dt * 0.16;
  rotX += (tRotX - rotX) * 0.08;
  rotY += (tRotY - rotY) * 0.08;
  group.rotation.x = rotX;
  group.rotation.y = rotY;

  if (apRunning) {
    apT += dt * 0.42;
    if (apT >= 1) {
      apT = 0; apRunning = false;
      apSphere.visible  = false;
      apLight.intensity = 0;
      document.getElementById('btnAP').textContent = '⚡ Fire action potential';
    } else {
      const pos = axonSpline.getPoint(apT);
      apSphere.position.copy(pos);
      apLight.position.copy(pos);
      apLight.intensity = 5 * Math.sin(apT * Math.PI) + Math.sin(apT * 90) * 0.9;
    }
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
