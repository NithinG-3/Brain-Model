<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060b18;
      font-family: system-ui, sans-serif;
      color: #c8dcff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #90b8ff;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #7a9acc;
      margin-bottom: 30px;
    }
    .buttons {
      display: flex;
      gap: 20px;
    }
    a {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 180px;
      height: 180px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s;
    }
    a span.icon { font-size: 48px; margin-bottom: 12px; }
    a span.label { font-size: 16px; }
    .neuron {
      background: rgba(30, 50, 120, 0.4);
      border: 1px solid rgba(80, 140, 255, 0.4);
      color: #90b8ff;
    }
    .brain {
      background: rgba(80, 30, 100, 0.4);
      border: 1px solid rgba(180, 80, 255, 0.4);
      color: #cc88ff;
    }
    a:hover { transform: scale(1.05); }
    .neuron:hover { background: rgba(30, 50, 120, 0.7); }
    .brain:hover  { background: rgba(80, 30, 100, 0.7); }
  </style>
</head>
<body>
  <h1>Brain Explorer</h1>
  <p>Select a model to explore</p>
  <div class="buttons">
    <a href="https://nithing-3.github.io/Brain-Model/neuron" class="neuron">
      <span class="icon">🧬</span>
      <span class="label">Neuron</span>
    </a>
    <a href="https://nithing-3.github.io/Brain-Model/brain" class="brain">
      <span class="icon">🧠</span>
      <span class="label">Brain</span>
    </a>
  </div>
</body>
</html>
